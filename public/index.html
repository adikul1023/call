<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureVoice - Secure Voice Calling</title>
  <script src="/runtime-config.js"></script>
  <style>
    <title>SecureVoice | Encrypted Voice Calling</title>
    <meta name="description" content="SecureVoice: End-to-end encrypted voice calling with WireGuard integration.">
    <meta name="theme-color" content="#081120">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
      margin: 0;
      padding: 0;
      :root {
        --page-bg: #07111f;
        --page-bg-soft: #0c1729;
        --surface: rgba(10, 18, 32, 0.76);
        --surface-strong: rgba(15, 23, 42, 0.92);
        --text-primary: #e5eefc;
        --text-secondary: #a9b7cf;
        --border: rgba(148, 163, 184, 0.18);
        --primary: #38bdf8;
        --primary-deep: #06b6d4;
        --primary-soft: rgba(56, 189, 248, 0.12);
        --primary-glow: rgba(56, 189, 248, 0.24);
        --accent: #34d399;
        --secondary: #a78bfa;
        --highlight: #fb7185;
        --gold: #fbbf24;
        --danger: #fb7185;
        --success-soft: rgba(52, 211, 153, 0.12);
        --warning-soft: rgba(251, 191, 36, 0.12);
        --shadow-lg: 0 28px 72px rgba(2, 6, 23, 0.58);
        --shadow-md: 0 18px 40px rgba(2, 6, 23, 0.42);
        --shadow-soft: 0 12px 28px rgba(2, 6, 23, 0.34);
        --btn-primary-start: #0f172a;
        --btn-primary-end: #1e293b;
        --btn-primary-border: rgba(148, 163, 184, 0.32);
        --btn-primary-text: #e2e8f0;
        --btn-success-start: #064e3b;
        --btn-success-end: #0f766e;
        --btn-danger-start: #7f1d1d;
        --btn-danger-end: #be123c;
        --radius-xl: 24px;
        --radius-lg: 18px;
        --radius-md: 12px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: 'Inter', Arial, sans-serif;
        position: relative;
        isolation: isolate;
        color-scheme: dark;
        background:
          radial-gradient(circle at top left, rgba(56, 189, 248, 0.14), transparent 24%),
          radial-gradient(circle at 88% 8%, rgba(167, 139, 250, 0.18), transparent 20%),
          radial-gradient(circle at center bottom, rgba(52, 211, 153, 0.12), transparent 26%),
          radial-gradient(circle at 14% 86%, rgba(251, 113, 133, 0.12), transparent 18%),
          linear-gradient(180deg, var(--page-bg) 0%, var(--page-bg-soft) 100%);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 24px 20px 28px;
        line-height: 1.5;
      }

      body::before,
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -1;
      }

      body::before {
        background:
          linear-gradient(rgba(148, 163, 184, 0.14) 1px, transparent 1px),
          linear-gradient(90deg, rgba(148, 163, 184, 0.1) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.42), transparent 88%);
        opacity: 0.16;
      }

      body::after {
        background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.08), transparent 44%);
        opacity: 0.8;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        text-decoration: none;
      }

      .topbar {
        max-width: 1120px;
        margin: 0 auto 18px;
        padding: 14px 18px;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background: rgba(10, 18, 32, 0.72);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: var(--shadow-soft);
        position: sticky;
        top: 12px;
        z-index: 50;
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      }

      .topbar:hover {
        border-color: rgba(56, 189, 248, 0.26);
        box-shadow: 0 18px 40px rgba(2, 6, 23, 0.48);
      }

      .topbar-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .brand strong {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .brand-logo {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid rgba(56, 189, 248, 0.45);
        box-shadow: 0 8px 18px rgba(6, 182, 212, 0.24);
        flex-shrink: 0;
        background: rgba(15, 23, 42, 0.8);
      }

      .brand strong {
        font-family: 'Space Grotesk', 'Inter', sans-serif;
        font-size: 1.1rem;
        letter-spacing: -0.02em;
        color: #f8fbff;
      }

      .brand span {
        color: var(--text-secondary);
        font-size: 0.88rem;
      }

      .site-nav {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .nav-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        color: #dbeafe;
        font-weight: 600;
        font-size: 0.95rem;
        background: rgba(148, 163, 184, 0.08);
        transition: background-color 0.25s ease, color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
      }

      .nav-link.nav-primary {
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.22), rgba(167, 139, 250, 0.22));
        color: #ffffff;
        border: 1px solid rgba(125, 211, 252, 0.24);
        box-shadow: 0 12px 24px rgba(2, 6, 23, 0.18);
      }

      .nav-link:hover {
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.16), rgba(167, 139, 250, 0.16));
        color: #ffffff;
        transform: translateY(-1px);
        box-shadow: 0 10px 22px rgba(56, 189, 248, 0.12);
      }

      .container {
        max-width: 1120px;
        margin: 0 auto;
        padding: 0;
        background: var(--surface);
        border: 1px solid rgba(148, 163, 184, 0.16);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
        transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
        position: relative;
        animation: fadeSlideUp 700ms ease-out;
      }

      .container:hover {
        border-color: rgba(56, 189, 248, 0.18);
        box-shadow: 0 32px 82px rgba(2, 6, 23, 0.66);
      }

      .header {
        text-align: left;
        margin-bottom: 0;
        padding: 34px 22px 28px;
        background:
          radial-gradient(circle at top right, rgba(56, 189, 248, 0.12), transparent 22%),
          radial-gradient(circle at 8% 16%, rgba(167, 139, 250, 0.12), transparent 18%),
          linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(10, 18, 32, 0.92));
        border-bottom: 1px solid var(--border);
        position: relative;
        overflow: hidden;
      }

      .header::after {
        content: '';
        position: absolute;
        inset: auto -10% 0 auto;
        width: 260px;
        height: 260px;
        background: radial-gradient(circle, rgba(56, 189, 248, 0.18), transparent 68%);
        pointer-events: none;
      }

      .header-content {
        max-width: 920px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
      }

      .header h1 {
        font-family: 'Space Grotesk', 'Inter', sans-serif;
        color: #f8fbff;
        font-size: clamp(2rem, 5vw, 3.2rem);
        margin-bottom: 10px;
        letter-spacing: -0.03em;
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }

      .hero-logo {
        width: clamp(42px, 6vw, 56px);
        height: clamp(42px, 6vw, 56px);
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid rgba(56, 189, 248, 0.5);
        box-shadow: 0 12px 26px rgba(6, 182, 212, 0.25);
        background: rgba(15, 23, 42, 0.8);
      }

      .header p {
        color: var(--text-secondary);
        font-size: 1.02rem;
        max-width: 720px;
      }

      .hero-note {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 14px;
        margin-bottom: 6px;
        padding: 10px 14px;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.14), rgba(167, 139, 250, 0.12));
        border: 1px solid rgba(56, 189, 248, 0.2);
        color: #e0f2fe;
        font-size: 0.9rem;
        font-weight: 600;
        box-shadow: 0 14px 28px rgba(2, 6, 23, 0.22);
        animation: shimmerPulse 4.2s ease-in-out infinite;
      }

      .auth-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 22px;
        align-items: stretch;
      }

      .auth-panel {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: rgba(8, 15, 28, 0.78);
        padding: 22px;
        box-shadow: var(--shadow-soft);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }

      .audio-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin: 20px 0;
      }

      .audio-avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 56%, #334155 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        color: white;
        position: relative;
        box-shadow: var(--shadow-md);
      }

      .audio-avatar.active::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 3px solid var(--accent);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(1.3);
          opacity: 0;
        }
      }

      .audio-label {
        text-align: center;
        margin-top: 10px;
        font-weight: 600;
        color: var(--text-secondary);
      }

      .card {
        background: var(--surface-strong);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        padding: 28px;
        box-shadow: var(--shadow-md);
        margin-bottom: 20px;
      }

      .section-wrap {
        padding: 28px;
      }

      .card h2 {
        color: #f8fbff;
        font-size: 1.35rem;
        margin-bottom: 18px;
        letter-spacing: -0.02em;
        font-family: 'Space Grotesk', 'Inter', sans-serif;
      }

      .card h3 {
        color: #f1f7ff;
        font-size: 1rem;
        margin: 16px 0 12px;
      }

      .auth-section {
        display: none;
      }

      .auth-section.active {
        display: block;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #e5eefc;
      }

      .form-group input {
        width: 100%;
        padding: 13px 15px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: var(--radius-md);
        font-size: 16px;
        color: #f8fbff;
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(30, 41, 59, 0.86));
        transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease, background 0.25s ease;
      }

      .form-group input::placeholder {
        color: rgba(169, 183, 207, 0.72);
      }

      .form-group select {
        width: 100%;
        padding: 13px 15px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: var(--radius-md);
        font-size: 16px;
        color: #f8fbff;
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(30, 41, 59, 0.86));
        transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease, background 0.25s ease;
      }

      input[type="checkbox"] {
        accent-color: var(--primary);
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.16);
        transform: translateY(-1px);
        background: linear-gradient(180deg, rgba(15, 23, 42, 1), rgba(30, 41, 59, 0.95));
      }

      .form-group select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.16);
        transform: translateY(-1px);
        background: linear-gradient(180deg, rgba(15, 23, 42, 1), rgba(30, 41, 59, 0.95));
      }

      .inline-action {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
      }

      .btn {
        position: relative;
        overflow: hidden;
        background: linear-gradient(135deg, var(--btn-primary-start) 0%, var(--btn-primary-end) 100%);
        color: var(--btn-primary-text);
        border: 1px solid var(--btn-primary-border);
        padding: 13px 24px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.01em;
        cursor: pointer;
        transition: transform 0.28s ease, box-shadow 0.28s ease, opacity 0.25s ease, filter 0.28s ease, border-color 0.28s ease, background 0.28s ease;
        margin: 5px;
        box-shadow: 0 10px 24px rgba(2, 6, 23, 0.34);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }

      .btn::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, transparent 18%, rgba(255, 255, 255, 0.14) 45%, transparent 72%);
        transform: translateX(-120%);
        transition: transform 0.65s ease;
      }

      .btn::before {
        content: '';
        position: absolute;
        inset: 1px;
        border-radius: 10px;
        background: radial-gradient(circle at 22% 18%, rgba(125, 211, 252, 0.14), transparent 44%),
                    linear-gradient(160deg, rgba(255, 255, 255, 0.03), transparent 48%);
        pointer-events: none;
        opacity: 0.8;
      }

      .btn:hover {
        transform: translateY(-2px) scale(1.01);
        box-shadow: 0 16px 30px rgba(2, 6, 23, 0.45), 0 0 0 1px rgba(148, 163, 184, 0.18);
        border-color: rgba(125, 211, 252, 0.4);
        filter: saturate(1.02);
      }

      .btn:hover::after {
        transform: translateX(120%);
      }

      .btn:focus-visible,
      .nav-link:focus-visible,
      input:focus-visible,
      select:focus-visible {
        outline: 3px solid rgba(56, 189, 248, 0.32);
        outline-offset: 2px;
      }

      .btn:disabled {
        background: linear-gradient(135deg, rgba(71, 85, 105, 0.44), rgba(51, 65, 85, 0.44));
        color: rgba(226, 232, 240, 0.62);
        border-color: rgba(148, 163, 184, 0.18);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-secondary {
        background: linear-gradient(135deg, #1f2937 0%, #334155 100%);
      }

      .btn-featured {
        background: linear-gradient(135deg, #0f766e 0%, #0ea5e9 48%, #2563eb 100%);
        border-color: rgba(125, 211, 252, 0.38);
        box-shadow: 0 14px 30px rgba(14, 165, 233, 0.24), 0 0 0 1px rgba(125, 211, 252, 0.12);
      }

      .btn-featured:hover {
        border-color: rgba(165, 243, 252, 0.52);
        box-shadow: 0 18px 34px rgba(14, 165, 233, 0.3), 0 0 18px rgba(56, 189, 248, 0.18);
      }

      .btn-success {
        background: linear-gradient(135deg, var(--btn-success-start) 0%, var(--btn-success-end) 100%);
        border-color: rgba(74, 222, 128, 0.34);
      }

      .btn-danger {
        background: linear-gradient(135deg, var(--btn-danger-start) 0%, var(--btn-danger-end) 100%);
        border-color: rgba(251, 113, 133, 0.34);
      }

      .user-info {
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.08), rgba(167, 139, 250, 0.08));
        padding: 16px 18px;
        border-radius: var(--radius-lg);
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid rgba(148, 163, 184, 0.16);
        box-shadow: var(--shadow-soft);
      }

      .user-info span {
        font-weight: 600;
        color: #f1f7ff;
      }

      .friends-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }

      .friends-list {
        max-height: 320px;
        overflow-y: auto;
        padding-right: 4px;
      }

      .friends-list::-webkit-scrollbar {
        width: 8px;
      }

      .friends-list::-webkit-scrollbar-thumb {
        background: rgba(100, 116, 139, 0.4);
        border-radius: 999px;
      }

      .friend-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 16px;
        border: 1px solid rgba(148, 163, 184, 0.16);
        border-radius: var(--radius-md);
        margin-bottom: 10px;
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.86), rgba(30, 41, 59, 0.78));
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease;
        animation: fadeSlideUp 500ms ease both;
      }

      .friend-item.online {
        border-color: rgba(52, 211, 153, 0.3);
        background: linear-gradient(135deg, rgba(52, 211, 153, 0.14), rgba(15, 23, 42, 0.86));
      }

      .friend-item:hover {
        transform: translateY(-1px);
        border-color: rgba(56, 189, 248, 0.34);
        box-shadow: 0 16px 28px rgba(2, 6, 23, 0.28);
      }

      .friend-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        flex-wrap: wrap;
        margin-left: 12px;
      }

      .friend-name {
        font-weight: 600;
        color: #f1f7ff;
      }

      .online-indicator {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #fb7185;
        display: inline-block;
        margin-top: 6px;
      }

      .online-indicator.online {
        background: var(--accent);
      }

      .call-section {
        text-align: center;
        padding: 8px 0 0;
      }

      .call-controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 20px 0;
      }

      .call-status {
        text-align: center;
        padding: 15px;
        border-radius: var(--radius-md);
        margin: 20px 0;
        font-weight: 600;
        border: 1px solid transparent;
        box-shadow: var(--shadow-soft);
        transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      }

      .status-waiting {
        background: linear-gradient(135deg, rgba(251, 191, 36, 0.14), rgba(15, 23, 42, 0.86));
        color: #fbbf24;
        border-color: rgba(251, 191, 36, 0.18);
      }

      .status-idle,
      .status-ready,
      .status-connecting,
      .status-incoming {
        background: linear-gradient(135deg, rgba(167, 139, 250, 0.12), rgba(15, 23, 42, 0.86));
        color: #c4b5fd;
        border-color: rgba(167, 139, 250, 0.18);
      }

      .status-calling {
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.14), rgba(15, 23, 42, 0.86));
        color: #7dd3fc;
        border-color: rgba(56, 189, 248, 0.16);
      }

      .status-connected {
        background: linear-gradient(135deg, rgba(52, 211, 153, 0.14), rgba(15, 23, 42, 0.86));
        color: #6ee7b7;
        border-color: rgba(52, 211, 153, 0.16);
      }

      .incoming-call {
        background: linear-gradient(135deg, rgba(251, 113, 133, 0.12), rgba(15, 23, 42, 0.86));
        color: #fecdd3;
        border: 1px solid rgba(251, 113, 133, 0.18);
        padding: 20px;
        border-radius: var(--radius-lg);
        text-align: center;
        margin: 20px 0;
        box-shadow: var(--shadow-soft);
      }

      .hidden {
        display: none;
      }

      .error {
        background: linear-gradient(135deg, rgba(251, 113, 133, 0.14), rgba(15, 23, 42, 0.86));
        color: #fecdd3;
        padding: 12px 14px;
        border-radius: 12px;
        margin: 10px 0;
        border: 1px solid rgba(251, 113, 133, 0.16);
        box-shadow: var(--shadow-soft);
      }

      .success {
        background: linear-gradient(135deg, rgba(52, 211, 153, 0.14), rgba(15, 23, 42, 0.86));
        color: #bbf7d0;
        padding: 12px 14px;
        border-radius: 12px;
        margin: 10px 0;
        border: 1px solid rgba(52, 211, 153, 0.16);
        box-shadow: var(--shadow-soft);
      }

      .section-heading {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        padding-bottom: 14px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      }

      .section-heading .hint {
        color: var(--text-secondary);
        font-size: 0.92rem;
      }

      .empty-state {
        color: #a9b7cf;
        padding: 10px;
        font-size: 0.95rem;
        border: 1px dashed rgba(148, 163, 184, 0.22);
        border-radius: 10px;
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.75), rgba(30, 41, 59, 0.62));
      }

      .card:hover,
      .auth-panel:hover {
        transform: translateY(-2px);
      }

      .card {
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.02), transparent 35%, rgba(22, 163, 74, 0.03));

  <script>
    // Ringtone Player Class
    class RingtonePlayer {
              <button id="startCallBtn" class="btn btn-featured" onclick="startCall()" aria-label="Start voice call">Start Voice Call</button>
              <button id="voiceBtn" class="btn" onclick="toggleVoice()" disabled aria-label="Mute or unmute">Mute</button>

        this.isPlaying = false;

      playIncoming() {
        this.type = 'incoming';
        this.play();
      }

      playOutgoing() {
        this.type = 'outgoing';
        this.play();
      }

      play() {
        if (this.isPlaying) return;
        
        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        this.gainNode = this.audioContext.createGain();
        this.gainNode.connect(this.audioContext.destination);
        this.gainNode.gain.value = 0.3;
        
        this.isPlaying = true;
        this.playRingtonePattern();
      }

      playRingtonePattern() {
        if (!this.isPlaying) return;

        if (this.type === 'incoming') {
          // Incoming call: Bell sound (chime pattern)
          // Play a series of bell-like tones
          this.playBell(523.25, 0.15, 0);      // C5
          this.playBell(659.25, 0.15, 0.15);   // E5
          this.playBell(783.99, 0.15, 0.30);   // G5
          this.playBell(1046.50, 0.2, 0.45);   // C6 (sustain)
          
          // Repeat every 3 seconds
          this.intervalId = setTimeout(() => {
            if (this.isPlaying) {
              this.playRingtonePattern();
            }
          }, 3000);
        } else {
          // Outgoing call: Soft bell tone
          this.playBell(659.25, 0.5, 0);
          this.playBell(783.99, 0.5, 0.6);
          
          // Repeat every 3 seconds
          this.intervalId = setTimeout(() => {
            if (this.isPlaying) {
              this.playRingtonePattern();
            }
          }, 3000);
        }
      }

      playBell(frequency, duration, delay) {
        const startTime = this.audioContext.currentTime + delay;
        const oscillator = this.audioContext.createOscillator();
        const beepGain = this.audioContext.createGain();
        
        oscillator.connect(beepGain);
        beepGain.connect(this.gainNode);
        
        oscillator.frequency.value = frequency;
        oscillator.type = 'sine';
        
        // Bell-like envelope: quick attack, exponential decay
        beepGain.gain.setValueAtTime(0, startTime);
        beepGain.gain.linearRampToValueAtTime(0.4, startTime + 0.01);
        beepGain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
        
        oscillator.start(startTime);
        oscillator.stop(startTime + duration);
      }

      playBeep(frequency, duration, delay) {
        // Keep old method for compatibility
        this.playBell(frequency, duration, delay);
      }

      stop() {
        this.isPlaying = false;
        if (this.intervalId) {
          clearTimeout(this.intervalId);
          this.intervalId = null;
        }
        if (this.gainNode) {
          this.gainNode.gain.value = 0;
        }
        if (this.audioContext) {
          this.audioContext.close();
          this.audioContext = null;
        }
      }
    }

    // Global ringtone instance
    const ringtonePlayer = new RingtonePlayer();

    // Global variables
    let currentUser = null;
    let ws = null;
    let pc = null;
    let localStream = null;
    let currentCallSession = null;
    let callState = 'idle'; // 'idle', 'calling', 'incoming', 'connected'
    let selectedFriend = null;
    let isMuted = false;
    let automationSettings = {
      autoAnswer: false,
      autoCallOnOnline: false,
      targetFriendId: null
    };

    // Initialize WebSocket connection
    function initWebSocket() {
      // Auto-detect protocol (wss:// for https://, ws:// for http://)
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const host = window.location.hostname;
      const port = window.location.port || (protocol === 'wss:' ? 443 : 80);
      const wsUrl = `${protocol}//${host}:${port}`;
      
      console.log(`🔌 Connecting to WebSocket: ${wsUrl}`);
      ws = new WebSocket(wsUrl);
      
      ws.onopen = () => {
        const secureIcon = protocol === 'wss:' ? '🔒' : '⚠️';
        console.log(`${secureIcon} WebSocket connected (${protocol.replace(':', '')})`);
        if (currentUser) {
          ws.send(JSON.stringify({
            type: 'authenticate',
            userId: currentUser.id
          }));
        }
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleWebSocketMessage(data);
      };

      ws.onclose = () => {
        console.log('WebSocket disconnected');
        setTimeout(initWebSocket, 3000); // Reconnect after 3 seconds
      };
    }

    // Handle WebSocket messages
    function handleWebSocketMessage(data) {
      switch (data.type) {
        case 'authenticated':
          console.log('WebSocket authenticated');
          loadFriends();
          loadPendingRequests();
          loadOnlineUsers();
          loadAutomationSettings();
          break;
          
        case 'call_incoming':
          currentCallSession = data.sessionId;
          // Track caller so hangup/decline can notify the right peer.
          selectedFriend = { id: data.callerId };
          showIncomingCall(data.callerId);
          // Auto-answer if enabled
          if (automationSettings.autoAnswer) {
            setTimeout(() => acceptCall(), 500);
          }
          break;
          
        case 'auto_call_initiated':
          // Auto-initiated call, start WebRTC setup
          currentCallSession = data.sessionId;
          selectedFriend = { id: data.friendId };
          startCallAutomatically();
          break;
          
        case 'auto_call_accepted':
          // Call was auto-accepted, continue with WebRTC
          currentCallSession = data.sessionId;
          updateCallStatus('connected', 'Call auto-accepted and connected!');
          enableCallControls();
          break;
          
        case 'call_response':
          if (data.accepted) {
            // Call accepted, now start media
            startMediaAndOffer();
          } else {
            updateCallStatus('idle', 'Call declined');
            resetCallState();
          }
          break;
          
        case 'signaling_message':
          handleSignalingMessage(data);
          break;
          
        case 'friend_request':
          showSuccess('You have a new friend request!');
          loadPendingRequests();
          break;
          
        case 'friend_accepted':
          showSuccess('Your friend request was accepted!');
          loadFriends();
          break;
          
        case 'refresh_friends':
          loadFriends();
          loadPendingRequests();
          break;
          
        case 'call_ended':
          // Stop ringtone if playing
          ringtonePlayer.stop();
          
          // Other user hung up, close our end
          if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
          }
          if (pc) {
            pc.close();
            pc = null;
          }
          const localVideo = document.getElementById('localVideo');
          const remoteVideo = document.getElementById('remoteVideo');
          if (localVideo) {
            localVideo.srcObject = null;
          }
          if (remoteVideo) {
            remoteVideo.srcObject = null;
          }
          resetCallState();
          updateCallStatus('idle', 'Call ended by other user');
          showSuccess('Call ended');
          break;
          
        case 'video_toggle':
          // Other user toggled their video
          remoteVideoEnabled = data.videoEnabled;
          if (data.videoEnabled) {
            showSuccess('Other user enabled video');
          } else {
            showSuccess('Other user disabled video');
            // Clear remote video display
            const remoteVideo = document.getElementById('remoteVideo');
            if (remoteVideo && remoteVideo.srcObject) {
              remoteVideo.srcObject.getVideoTracks().forEach(track => {
                track.enabled = false;
              });
            }
          }
          break;
      }
    }

    // Authentication functions
    function showLogin() {
      console.log('showLogin called');
      // Ensure auth section is visible
      const authSection = document.getElementById('authSection');
      if (authSection) {
        authSection.style.display = 'block';
      }
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      if (loginForm) loginForm.classList.add('active');
      if (registerForm) registerForm.classList.remove('active');
      console.log('Login form should now be visible');
    }

    function showRegister() {
      console.log('showRegister called');
      // Ensure auth section is visible
      const authSection = document.getElementById('authSection');
      if (authSection) {
        authSection.style.display = 'block';
      }
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      if (loginForm) loginForm.classList.remove('active');
      if (registerForm) registerForm.classList.add('active');
      console.log('Register form should now be visible');
    }

    document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        
        if (data.success) {
          currentUser = data.user;
          localStorage.setItem('currentUser', JSON.stringify(data.user));
          showMainApp();
          initWebSocket();
        } else {
          showError(data.error);
        }
      } catch (error) {
        showError('Login failed: ' + error.message);
      }
    });

    document.getElementById('registerFormElement').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('registerUsername').value;
      const password = document.getElementById('registerPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showError('Passwords do not match');
        return;
      }

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        
        if (data.success) {
          showSuccess('Registration successful! Please login.');
          showLogin();
        } else {
          showError(data.error);
        }
      } catch (error) {
        showError('Registration failed: ' + error.message);
      }
    });

    function showMainApp() {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('mainApp').classList.remove('hidden');
      if (currentUser && currentUser.username) {
        document.getElementById('currentUsername').textContent = currentUser.username;
      }
    }
    
    function showAuthSection() {
      document.getElementById('authSection').style.display = 'block';
      document.getElementById('mainApp').classList.add('hidden');
    }

    // Automation settings functions
    async function loadAutomationSettings() {
      try {
        const response = await fetch(`/api/automation/settings/${currentUser.id}`);
        const data = await response.json();
        
        automationSettings = {
          autoAnswer: data.autoAnswer || false,
          autoCallOnOnline: data.autoCallOnOnline || false,
          targetFriendId: data.targetFriendId || null
        };
        
        document.getElementById('autoAnswer').checked = automationSettings.autoAnswer;
        document.getElementById('autoCallOnOnline').checked = automationSettings.autoCallOnOnline;
        
        if (automationSettings.autoCallOnOnline) {
          document.getElementById('targetFriendGroup').style.display = 'block';
          populateTargetFriendSelect();
        }
        
        if (automationSettings.targetFriendId) {
          document.getElementById('targetFriendSelect').value = automationSettings.targetFriendId;
        }
      } catch (error) {
        console.error('Failed to load automation settings:', error);
      }
    }

    async function updateAutomationSettings() {
      const autoAnswer = document.getElementById('autoAnswer').checked;
      const autoCallOnOnline = document.getElementById('autoCallOnOnline').checked;
      const targetFriendId = document.getElementById('targetFriendSelect').value || null;
      
      automationSettings = {
        autoAnswer: autoAnswer,
        autoCallOnOnline: autoCallOnOnline,
        targetFriendId: targetFriendId
      };
      
      if (autoCallOnOnline) {
        document.getElementById('targetFriendGroup').style.display = 'block';
        if (!document.getElementById('targetFriendSelect').options.length > 1) {
          populateTargetFriendSelect();
        }
      } else {
        document.getElementById('targetFriendGroup').style.display = 'none';
      }
      
      try {
        const response = await fetch('/api/automation/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: currentUser.id,
            autoAnswer: autoAnswer,
            autoCallFriends: false,
            autoCallOnOnline: autoCallOnOnline,
            targetFriendId: targetFriendId
          })
        });
        
        const data = await response.json();
        if (data.success) {
          const statusDiv = document.getElementById('automationStatus');
          statusDiv.style.display = 'block';
          statusDiv.textContent = 'Automation settings saved!';
          statusDiv.className = 'success';
          setTimeout(() => {
            statusDiv.style.display = 'none';
          }, 3000);
        }
      } catch (error) {
        console.error('Failed to update automation settings:', error);
        showError('Failed to update automation settings');
      }
    }

    async function populateTargetFriendSelect() {
      try {
        const response = await fetch(`/api/friends/${currentUser.id}`);
        const data = await response.json();
        
        const select = document.getElementById('targetFriendSelect');
        select.innerHTML = '<option value="">All Friends</option>';
        
        data.friends.forEach(friend => {
          const option = document.createElement('option');
          option.value = friend.id;
          option.textContent = friend.username;
          select.appendChild(option);
        });
      } catch (error) {
        console.error('Failed to load friends for target select:', error);
      }
    }

    async function logout() {
      if (currentUser) {
        try {
          await fetch('/api/logout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentUser.id })
          });
        } catch (error) {
          console.error('Logout error:', error);
        }
      }
      if (ws) {
        ws.close();
      }
      currentUser = null;
      localStorage.removeItem('currentUser');
      showAuthSection();
      showLogin();
    }

    // Friend management
    async function addFriend() {
      const friendUsername = document.getElementById('friendUsername').value;
      if (!friendUsername) return;

      try {
        const response = await fetch('/api/friends/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            userId: currentUser.id, 
            friendUsername: friendUsername 
          })
        });

        const data = await response.json();
        
        if (data.success) {
          showSuccess('Friend added successfully!');
          document.getElementById('friendUsername').value = '';
          loadFriends();
        } else {
          showError(data.error);
        }
      } catch (error) {
        showError('Failed to add friend: ' + error.message);
      }
    }

    async function loadPendingRequests() {
      try {
        const response = await fetch(`/api/friends/pending/${currentUser.id}`);
        const data = await response.json();
        
        const pendingList = document.getElementById('pendingRequests');
        pendingList.innerHTML = '';
        
        if (data.requests && data.requests.length > 0) {
          data.requests.forEach(request => {
            const requestItem = document.createElement('div');
            requestItem.className = 'friend-item';
            requestItem.innerHTML = `
              <div>
                <div class="friend-name">${request.username}</div>
                <small style="color: #6c757d;">Friend request</small>
              </div>
              <div>
                <button class="btn btn-success" style="padding: 8px 15px; font-size: 14px;" onclick="acceptFriendRequest(${request.user_id}, '${request.username}')">Accept</button>
                <button class="btn btn-danger" style="padding: 8px 15px; font-size: 14px;" onclick="rejectFriendRequest(${request.user_id})">Reject</button>
              </div>
            `;
            pendingList.appendChild(requestItem);
          });
        } else {
          pendingList.innerHTML = '<p style="color: #6c757d; padding: 10px;">No pending requests</p>';
        }
      } catch (error) {
        console.error('Failed to load pending requests:', error);
      }
    }

    async function acceptFriendRequest(friendId, friendName) {
      try {
        const response = await fetch('/api/friends/accept', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            userId: currentUser.id, 
            friendId: friendId 
          })
        });

        const data = await response.json();
        
        if (data.success) {
          showSuccess(`You are now friends with ${friendName}!`);
          loadPendingRequests();
          loadFriends();
        } else {
          showError(data.error);
        }
      } catch (error) {
        showError('Failed to accept friend request: ' + error.message);
      }
    }

    async function rejectFriendRequest(friendId) {
      try {
        const response = await fetch('/api/friends/reject', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            userId: currentUser.id, 
            friendId: friendId 
          })
        });

        const data = await response.json();
        
        if (data.success) {
          showSuccess('Friend request rejected');
          loadPendingRequests();
        } else {
          showError(data.error);
        }
      } catch (error) {
        showError('Failed to reject friend request: ' + error.message);
      }
    }

    async function loadFriends() {
      try {
        const response = await fetch(`/api/friends/${currentUser.id}`);
        const data = await response.json();
        
        const friendsList = document.getElementById('friendsList');
        friendsList.innerHTML = '';
        
        if (data.friends && data.friends.length > 0) {
          data.friends.forEach(friend => {
            const friendItem = document.createElement('div');
            friendItem.className = `friend-item ${friend.is_online ? 'online' : ''}`;
            friendItem.innerHTML = `
              <div>
                <div class="friend-name">${friend.username}</div>
                <div class="online-indicator ${friend.is_online ? 'online' : ''}"></div>
              </div>
              <button class="btn" onclick="selectFriend(${friend.id}, '${friend.username}')" 
                      ${friend.is_online ? '' : 'disabled'}>
                Call
              </button>
            `;
            friendsList.appendChild(friendItem);
          });
        } else {
          friendsList.innerHTML = '<p style="color: #6c757d; padding: 10px;">No friends yet</p>';
        }
        
        // Update target friend select if it exists
        if (automationSettings.autoCallOnOnline) {
          populateTargetFriendSelect();
        }
      } catch (error) {
        console.error('Failed to load friends:', error);
      }
    }

    async function loadOnlineUsers() {
      try {
        const response = await fetch('/api/users/online');
        const data = await response.json();
        
        const onlineUsers = document.getElementById('onlineUsers');
        onlineUsers.innerHTML = '';
        
        data.users.forEach(user => {
          if (user.id !== currentUser.id) {
            const userItem = document.createElement('div');
            userItem.className = 'friend-item online';
            userItem.innerHTML = `
              <div>
                <div class="friend-name">${user.username}</div>
                <div class="online-indicator online"></div>
              </div>
              <button class="btn" onclick="selectFriend(${user.id}, '${user.username}')">
                Call
              </button>
            `;
            onlineUsers.appendChild(userItem);
          }
        });
      } catch (error) {
        console.error('Failed to load online users:', error);
      }
    }

    function selectFriend(friendId, friendName) {
      selectedFriend = { id: friendId, name: friendName };
      document.getElementById('startCallBtn').disabled = false;
      updateCallStatus('ready', `Selected: ${friendName}. Click "Start Call" to begin.`);
    }

    function getPeerConnectionConfig() {
      const runtimeConfig = window.__WEBRTC_CONFIG__ || {};
      const hasRelayServers = Array.isArray(runtimeConfig.iceServers) && runtimeConfig.iceServers.length > 0;

      if (hasRelayServers) {
        return {
          iceServers: runtimeConfig.iceServers,
          iceTransportPolicy: runtimeConfig.iceTransportPolicy || 'relay'
        };
      }

      // Keep the existing direct-connection fallback for local/VPN testing.
      return {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' }
        ]
      };
    }

    function createPeerConnection() {
      return new RTCPeerConnection(getPeerConnectionConfig());
    }

    // WebRTC functions
    async function startCall() {
      if (!selectedFriend) return;

      try {
        // Play outgoing ringing tone
        ringtonePlayer.playOutgoing();
        
        updateCallStatus('calling', 'Initiating call...');
        
        // Create peer connection with STUN fallback for internet NAT traversal.
        pc = createPeerConnection();

        // Set up event handlers
        pc.ontrack = (event) => {
          console.log('✅ Receiving remote audio stream');
          const remoteAudio = document.getElementById('remoteAudio');
          if (remoteAudio) {
            remoteAudio.srcObject = event.streams[0];
          }
          document.getElementById('remoteAudioIndicator').classList.add('active');
        };

        pc.onicecandidate = (event) => {
          if (event.candidate) {
            console.log('✅ Sending ICE candidate');
            sendSignalingMessage('ice-candidate', event.candidate);
          }
        };

        pc.onconnectionstatechange = () => {
          console.log('📡 [startCall] Connection state:', pc.connectionState);
          if (pc.connectionState === 'connected') {
            console.log('✅ WebRTC connection established!');
          }
          if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
            console.log('❌ Connection failed or disconnected');
            hangup();
          }
        };

        // Send call initiation (don't start media yet)
        const response = await fetch('/api/call/initiate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            callerId: currentUser.id,
            calleeId: selectedFriend.id
          })
        });

        const data = await response.json();
        if (data.success) {
          currentCallSession = data.sessionId;
          updateCallStatus('calling', 'Waiting for answer...');
          
          // Enable hangup button so user can cancel the call
          document.getElementById('hangupBtn').disabled = false;
          document.getElementById('startCallBtn').disabled = true;
        }

      } catch (error) {
        console.error('Error starting call:', error);
        showError('Failed to start call: ' + error.message);
        resetCallState();
      }
    }

    async function startMediaAndOffer() {
      try {
        // Stop ringing tone when call connects
        ringtonePlayer.stop();
        
        updateCallStatus('connecting', 'Starting voice call...');
        
        // Get local media (audio only)
        localStream = await navigator.mediaDevices.getUserMedia({ 
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
        
        document.getElementById('localAudioIndicator').classList.add('active');
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        // Create and send offer
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        sendSignalingMessage('offer', offer);
        
        updateCallStatus('connected', 'Voice call connected!');
        enableCallControls();
      } catch (error) {
        console.error('Error starting media:', error);
        showError('Failed to start audio: ' + error.message);
        hangup();
      }
    }

    function sendSignalingMessage(type, data) {
      if (ws && currentCallSession) {
        ws.send(JSON.stringify({
          type: 'signaling_message',
          fromUserId: currentUser.id,
          toUserId: selectedFriend.id,
          sessionId: currentCallSession,
          messageType: type,
          messageData: data
        }));
      }
    }

    function handleSignalingMessage(data) {
      // Ensure we know who the peer is and have a session id
      if (!selectedFriend && data.fromUserId) {
        selectedFriend = { id: data.fromUserId };
      }
      if (!currentCallSession && data.sessionId) {
        currentCallSession = data.sessionId;
      }

      switch (data.messageType) {
        case 'offer':
          handleOffer(data.messageData);
          break;
        case 'answer':
          handleAnswer(data.messageData);
          break;
        case 'ice-candidate':
          handleIceCandidate(data.messageData);
          break;
      }
    }

    async function handleOffer(offer) {
      try {
        // If we don't have a peer connection yet, create one
        if (!pc) {
          pc = createPeerConnection();

          pc.ontrack = (event) => {
            console.log('✅ Receiving encrypted audio stream');
            const remoteAudio = document.getElementById('remoteAudio');
            if (remoteAudio) {
              remoteAudio.srcObject = event.streams[0];
            }
            document.getElementById('remoteAudioIndicator').classList.add('active');
          };

          pc.onicecandidate = (event) => {
            if (event.candidate) {
              console.log('✅ ICE candidate:', event.candidate.candidate.substring(0, 50) + '...');
              sendSignalingMessage('ice-candidate', event.candidate);
            }
          };

          pc.onconnectionstatechange = () => {
            console.log('📡 [handleOffer] Connection state:', pc.connectionState);
            if (pc.connectionState === 'connected') {
              console.log('✅ Call connected!');
              // Verify encryption
              pc.getStats().then(stats => {
                stats.forEach(report => {
                  if (report.type === 'transport') {
                    console.log('🔒 DTLS State:', report.dtlsState);
                  }
                });
              });
            }
            if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
              console.log('❌ Connection failed');
              hangup();
            }
          };
        }

        await pc.setRemoteDescription(offer);

        // Get local media (audio only)
        if (!localStream) {
          localStream = await navigator.mediaDevices.getUserMedia({ 
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true
            }
          });
          
          document.getElementById('localAudioIndicator').classList.add('active');
          localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        sendSignalingMessage('answer', answer);

        updateCallStatus('connected', 'Voice call connected!');
        enableCallControls();

      } catch (error) {
        console.error('Error handling offer:', error);
        showError('Failed to handle incoming call: ' + error.message);
      }
    }

    async function handleAnswer(answer) {
      try {
        // Stop ringing tone when call is answered
        ringtonePlayer.stop();
        
        await pc.setRemoteDescription(answer);
        updateCallStatus('connected', 'Call connected!');
      } catch (error) {
        console.error('Error handling answer:', error);
        showError('Failed to handle answer: ' + error.message);
      }
    }

    async function handleIceCandidate(candidate) {
      try {
        await pc.addIceCandidate(candidate);
      } catch (error) {
        console.error('Error handling ICE candidate:', error);
      }
    }

    async function showIncomingCall(callerId) {
      // Set the caller as selected friend
      selectedFriend = { id: callerId };
      
      // Play incoming ringtone
      ringtonePlayer.playIncoming();
      
      // Try to get caller name from friends list or fetch it
      let callerName = 'Unknown';
      try {
        const response = await fetch(`/api/friends/${currentUser.id}`);
        const data = await response.json();
        const caller = data.friends.find(f => f.id === callerId);
        if (caller) {
          callerName = caller.username;
          selectedFriend.name = callerName;
        }
      } catch (error) {
        console.error('Failed to fetch caller name:', error);
      }
      
      document.getElementById('callerName').textContent = callerName;
      document.getElementById('incomingCall').classList.remove('hidden');
      updateCallStatus('incoming', 'Incoming call...');
      
      // Enable hangup button for incoming call too
      document.getElementById('hangupBtn').disabled = false;
    }

    async function acceptCall() {
      // Stop ringtone
      ringtonePlayer.stop();
      
      document.getElementById('incomingCall').classList.add('hidden');
      
      // If session exists, accept it via API and notify caller
      if (currentCallSession && selectedFriend) {
        try {
          await fetch('/api/call/accept', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
              sessionId: currentCallSession,
              calleeId: currentUser.id
            })
          });
          
          // Send acceptance notification to caller via WebSocket
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
              type: 'call_response',
              callerId: selectedFriend.id,
              sessionId: currentCallSession,
              accepted: true
            }));
          }
          
          // If we don't have a peer connection yet (auto-answered), set it up
          if (!pc) {
            await handleIncomingCallSetup();
          }
        } catch (error) {
          console.error('Error accepting call:', error);
        }
      }
      
      updateCallStatus('connected', 'Call accepted!');
      enableCallControls();
    }

    // Handle incoming call WebRTC setup
    async function handleIncomingCallSetup() {
      try {
        // Wait for the offer to arrive via signaling
        // This will be handled in handleSignalingMessage
        updateCallStatus('waiting', 'Waiting for call setup...');
      } catch (error) {
        console.error('Error setting up incoming call:', error);
      }
    }

    // Auto-start call when automation triggers it
    async function startCallAutomatically() {
      if (!selectedFriend || !currentCallSession) return;
      
      try {
        updateCallStatus('calling', 'Auto-connecting call...');
        
        // Create peer connection with STUN fallback for internet NAT traversal.
        pc = createPeerConnection();

        // Set up event handlers
        pc.ontrack = (event) => {
          console.log('✅ Receiving encrypted audio stream');
          const remoteAudio = document.getElementById('remoteAudio');
          if (remoteAudio) {
            remoteAudio.srcObject = event.streams[0];
          }
          document.getElementById('remoteAudioIndicator').classList.add('active');
        };

        pc.onicecandidate = (event) => {
          if (event.candidate) {
            console.log('✅ Sending ICE candidate');
            sendSignalingMessage('ice-candidate', event.candidate);
          }
        };

        pc.onconnectionstatechange = () => {
          console.log('📡 [autoCall] Connection state:', pc.connectionState);
          if (pc.connectionState === 'connected') {
            console.log('✅ Auto-call connected!');
          }
          if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
            console.log('❌ Auto-call failed');
            hangup();
          }
        };

        // Get local media (audio only)
        localStream = await navigator.mediaDevices.getUserMedia({ 
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
        
        document.getElementById('localAudioIndicator').classList.add('active');
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        // Create offer
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        sendSignalingMessage('offer', offer);
        enableCallControls();

      } catch (error) {
        console.error('Error auto-starting call:', error);
        showError('Failed to auto-start call: ' + error.message);
        resetCallState();
      }
    }

    function declineCall() {
      // Stop ringtone
      ringtonePlayer.stop();

      // Notify caller that we declined (so caller doesn't keep ringing)
      if (currentCallSession && selectedFriend && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'call_response',
          callerId: selectedFriend.id,
          sessionId: currentCallSession,
          accepted: false
        }));
      }

      // End the call session in the database (server will notify the other user)
      if (currentCallSession) {
        fetch('/api/call/end', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: currentCallSession, endedByUserId: currentUser?.id })
        }).catch(() => {});
      }
      
      document.getElementById('incomingCall').classList.add('hidden');
      updateCallStatus('idle', 'Call declined');
      resetCallState();
    }

    function toggleVoice() {
      if (localStream) {
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
          audioTrack.enabled = !audioTrack.enabled;
          isMuted = !audioTrack.enabled;
          document.getElementById('voiceBtn').textContent = audioTrack.enabled ? '🔇 Mute' : '🔊 Unmute';
          
          // Update local audio indicator
          if (audioTrack.enabled) {
            document.getElementById('localAudioIndicator').classList.add('active');
          } else {
            document.getElementById('localAudioIndicator').classList.remove('active');
          }
        }
      }
    }

    function hangup() {
      // Stop ringtone if playing
      ringtonePlayer.stop();
      
      // Best-effort WS notify (fast UI teardown on the other side)
      if (currentCallSession && selectedFriend && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'call_ended',
          fromUserId: currentUser.id,
          toUserId: selectedFriend.id,
          sessionId: currentCallSession
        }));
      }

      // Always end the call session in the database (server will notify the other user)
      if (currentCallSession) {
        fetch('/api/call/end', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: currentCallSession, endedByUserId: currentUser?.id })
        }).catch(() => {});
      }

      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }

      if (pc) {
        pc.close();
        pc = null;
      }

      document.getElementById('localAudioIndicator').classList.remove('active');
      document.getElementById('remoteAudioIndicator').classList.remove('active');
      document.getElementById('remoteAudio').srcObject = null;
      
      resetCallState();
      updateCallStatus('idle', 'Call ended');
    }

    function enableCallControls() {
      document.getElementById('voiceBtn').disabled = false;
      document.getElementById('hangupBtn').disabled = false;
      document.getElementById('startCallBtn').disabled = true;
    }

    function resetCallState() {
      callState = 'idle';
      currentCallSession = null;
      selectedFriend = null;
      isMuted = false;
      
      document.getElementById('voiceBtn').disabled = true;
      document.getElementById('voiceBtn').textContent = '🔇 Mute';
      document.getElementById('hangupBtn').disabled = true;
      document.getElementById('startCallBtn').disabled = true;
      
      updateCallStatus('idle', 'Ready to make voice calls');
    }

    function updateCallStatus(status, message) {
      const statusElement = document.getElementById('callStatus');
      statusElement.className = `call-status status-${status}`;
      statusElement.textContent = message;
    }

    function showError(message) {
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error';
      errorDiv.textContent = message;
      document.querySelector('.container').insertBefore(errorDiv, document.querySelector('.container').firstChild);
      setTimeout(() => errorDiv.remove(), 5000);
    }

    function showSuccess(message) {
      const successDiv = document.createElement('div');
      successDiv.className = 'success';
      successDiv.textContent = message;
      document.querySelector('.container').insertBefore(successDiv, document.querySelector('.container').firstChild);
      setTimeout(() => successDiv.remove(), 3000);
    }

    // Initialize app
    document.addEventListener('DOMContentLoaded', () => {
      // Check for saved session
      const savedUser = localStorage.getItem('currentUser');
      if (savedUser) {
        try {
          currentUser = JSON.parse(savedUser);
          showMainApp();
          initWebSocket();
        } catch (error) {
          console.error('Failed to restore session:', error);
          localStorage.removeItem('currentUser');
          showAuthSection();
          showLogin();
        }
      } else {
        showAuthSection();
        showLogin();
      }
    });
  </script>
</body>
