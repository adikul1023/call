<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebRTC Call Demo v0.2</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      padding: 20px;
    }
    textarea {
      width: 90%;
      height: 120px;
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #222;
      color: #eee;
    }
    button {
      margin: 8px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #444;
      color: #fff;
      cursor: pointer;
    }
    button:hover { background: #666; }
    video {
      width: 40%;
      margin: 10px;
      border-radius: 10px;
      background: black;
    }
    #stepContainer > div { display: none; }
  </style>
</head>
<body>
  <h2>WebRTC Call Demo v0.2</h2>

  <div id="stepChoice">
    <p>Are you starting the call or answering one?</p>
    <button onclick="chooseRole('offerer')">I want to send an Offer</button>
    <button onclick="chooseRole('answerer')">I already have an Offer</button>
  </div>

  <div id="stepContainer">
    <!-- Offerer flow -->
    <div id="offererStep">
      <button onclick="createOffer()">Create Offer</button>
      <p>Share this Offer:</p>
      <textarea id="offerOut" readonly></textarea>
      <p>Paste Answer from peer:</p>
      <textarea id="answerIn"></textarea>
      <button onclick="applyAnswer()">Apply Answer</button>
    </div>

    <!-- Answerer flow -->
    <div id="answererStep">
      <p>Paste Offer from peer:</p>
      <textarea id="offerIn"></textarea>
      <button onclick="generateAnswer()">Generate Answer</button>
      <p>Share this Answer:</p>
      <textarea id="answerOut" readonly></textarea>
    </div>
  </div>

  <h3>Call Controls</h3>
  <div id="callControls">
    <button onclick="startCall()" id="startCallBtn">Start Call</button>
    <button onclick="startVoice()" id="voiceBtn" disabled>Voice Only</button>
    <button onclick="startVideo()" id="videoBtn" disabled>Video Call</button>
    <button onclick="hangup()" id="hangupBtn" disabled>Hang Up</button>
  </div>
  <div>
    <video id="localVideo" autoplay muted playsinline style="display: none;"></video>
    <video id="remoteVideo" autoplay playsinline style="display: none;"></video>
  </div>

<script>
let pc;
let localStream;
let role;

async function initPeer() {
  pc = new RTCPeerConnection();
  pc.ontrack = (e) => {
    document.getElementById("remoteVideo").srcObject = e.streams[0];
  };
}

// Step choice
function chooseRole(selected) {
  role = selected;
  document.getElementById("stepChoice").style.display = "none";
  document.querySelectorAll("#stepContainer > div").forEach(d => d.style.display="none");
  document.getElementById(role+"Step").style.display = "block";
  initPeer();
}

// Offerer flow
async function createOffer() {
  try {
    console.log("Creating offer...");
    await ensureLocalStream();
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    document.getElementById("offerOut").value = JSON.stringify(offer);
    console.log("Offer created successfully!");
  } catch (error) {
    console.error("Error creating offer:", error);
    alert("Error creating offer: " + error.message);
  }
}

async function applyAnswer() {
  try {
    console.log("Applying answer...");
    const answerText = document.getElementById("answerIn").value.trim();
    if (!answerText) {
      alert("Please paste an answer first!");
      return;
    }
    
    const answer = JSON.parse(answerText);
    await pc.setRemoteDescription(new RTCSessionDescription(answer));
    console.log("Answer applied successfully!");
    alert("Answer applied! Click 'Start Call' when ready to begin.");
  } catch (error) {
    console.error("Error applying answer:", error);
    alert("Error applying answer: " + error.message);
  }
}

// Answerer flow
async function generateAnswer() {
  try {
    console.log("Starting answer generation...");
    
    // Get and parse the offer
    const offerText = document.getElementById("offerIn").value.trim();
    if (!offerText) {
      alert("Please paste an offer first!");
      return;
    }
    
    console.log("Parsing offer...");
    const offer = JSON.parse(offerText);
    console.log("Offer parsed successfully:", offer);
    
    // Set remote description
    console.log("Setting remote description...");
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    console.log("Remote description set successfully");

    // Get local media stream
    console.log("Getting local stream...");
    await ensureLocalStream();
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    console.log("Local tracks added to peer connection");

    // Create answer
    console.log("Creating answer...");
    const answer = await pc.createAnswer();
    console.log("Answer created:", answer);
    
    // Set local description
    console.log("Setting local description...");
    await pc.setLocalDescription(answer);
    console.log("Local description set successfully");

    // Wait for ICE gathering to complete (with timeout)
    console.log("Waiting for ICE gathering to complete...");
    await new Promise((resolve, reject) => {
      const timeout = setTimeout(() => {
        console.log("ICE gathering timeout, proceeding anyway");
        resolve();
      }, 5000); // 5 second timeout
      
      if (pc.iceGatheringState === "complete") {
        clearTimeout(timeout);
        resolve();
      } else {
        function checkState() {
          console.log("ICE gathering state:", pc.iceGatheringState);
          if (pc.iceGatheringState === "complete") {
            pc.removeEventListener("icegatheringstatechange", checkState);
            clearTimeout(timeout);
            resolve();
          }
        }
        pc.addEventListener("icegatheringstatechange", checkState);
      }
    });

    // Display the answer
    console.log("Displaying answer...");
    document.getElementById("answerOut").value = JSON.stringify(pc.localDescription);
    console.log("Answer generation completed successfully!");
    
  } catch (error) {
    console.error("Error generating answer:", error);
    alert("Error generating answer: " + error.message);
  }
}

// Media setup
async function ensureLocalStream() {
  if (!localStream) {
    localStream = await navigator.mediaDevices.getUserMedia({audio: true, video: true});
    document.getElementById("localVideo").srcObject = localStream;
    // Disable both audio and video by default - only enable when user starts call
    localStream.getVideoTracks().forEach(track => track.enabled = false);
    localStream.getAudioTracks().forEach(track => track.enabled = false);
  }
}

// Call controls
async function startCall() {
  try {
    console.log("Starting call...");
    await ensureLocalStream();
    
    // Enable audio by default when starting call
    localStream.getAudioTracks().forEach(track => track.enabled = true);
    
    // Show local video element
    document.getElementById("localVideo").style.display = "block";
    
    // Enable call control buttons
    document.getElementById("voiceBtn").disabled = false;
    document.getElementById("videoBtn").disabled = false;
    document.getElementById("hangupBtn").disabled = false;
    document.getElementById("startCallBtn").disabled = true;
    
    console.log("Call started successfully!");
  } catch (error) {
    console.error("Error starting call:", error);
    alert("Error starting call: " + error.message);
  }
}

async function startVoice() {
  if (!localStream) await ensureLocalStream();
  // Only audio tracks
  localStream.getVideoTracks().forEach(track => track.enabled = false);
  localStream.getAudioTracks().forEach(track => track.enabled = true);
  
  // Hide video elements
  document.getElementById("localVideo").style.display = "none";
  document.getElementById("remoteVideo").style.display = "none";
  
  console.log("Voice-only call started");
}

async function startVideo() {
  if (!localStream) await ensureLocalStream();
  // Enable both audio and video
  localStream.getVideoTracks().forEach(track => track.enabled = true);
  localStream.getAudioTracks().forEach(track => track.enabled = true);
  
  // Show video elements
  document.getElementById("localVideo").style.display = "block";
  document.getElementById("remoteVideo").style.display = "block";
  
  console.log("Video call started");
}

function hangup() {
  try {
    console.log("Hanging up call...");
    
    // Stop all tracks
    if (localStream) {
      localStream.getTracks().forEach(track => track.stop());
      localStream = null;
    }
    
    // Close peer connection
    if (pc) {
      pc.close();
      pc = null;
    }
    
    // Hide video elements
    document.getElementById("localVideo").style.display = "none";
    document.getElementById("remoteVideo").style.display = "none";
    document.getElementById("localVideo").srcObject = null;
    document.getElementById("remoteVideo").srcObject = null;
    
    // Reset button states
    document.getElementById("startCallBtn").disabled = false;
    document.getElementById("voiceBtn").disabled = true;
    document.getElementById("videoBtn").disabled = true;
    document.getElementById("hangupBtn").disabled = true;
    
    // Clear textareas
    document.getElementById("offerOut").value = "";
    document.getElementById("answerIn").value = "";
    document.getElementById("offerIn").value = "";
    document.getElementById("answerOut").value = "";
    
    // Show role selection again
    document.getElementById("stepChoice").style.display = "block";
    document.querySelectorAll("#stepContainer > div").forEach(d => d.style.display = "none");
    
    console.log("Call ended successfully");
    alert("Call ended");
  } catch (error) {
    console.error("Error hanging up:", error);
    alert("Error hanging up: " + error.message);
  }
}
</script>
</body>
</html>
