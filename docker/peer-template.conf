# Example client configuration for WireGuard
# Save as: peer1.conf (Windows/Linux) or peer1.conf.wg (iOS/Android)

[Interface]
# Client's private key (generate with: wg genkey)
PrivateKey = <REPLACE_WITH_CLIENT_PRIVATE_KEY>

# Client's VPN IP address
Address = 10.0.0.2/24

# DNS server (optional, use Cloudflare or Google DNS)
DNS = 1.1.1.1, 8.8.8.8

[Peer]
# Server's public key (get from server after first docker compose up)
PublicKey = <REPLACE_WITH_SERVER_PUBLIC_KEY>

# Server's public IP and WireGuard port
Endpoint = <YOUR_AWS_PUBLIC_IP>:51820

# Route only VPN traffic through tunnel (10.0.0.0/24)
# For full tunnel VPN, use: AllowedIPs = 0.0.0.0/0
AllowedIPs = 10.0.0.0/24

# Keep connection alive through NAT
PersistentKeepalive = 25
